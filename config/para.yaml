# ============================================================
#  dfs_planner — 参数文件（顶层 ros__parameters）
# ============================================================
#  所有常量与默认值均从此文件读取。
# ============================================================

/**:
  ros__parameters:

    # -------------------- 场地网格 --------------------
    grid_rows:         6
    grid_cols:         3
    # 高度图请在dfs_planner_node.py中编辑

    # -------------------- DFS 代价权重 --------------------
    move_cost:         2
    turn_cost:         1
    fetch_kfs2_cost:   4

    # -------------------- 默认值 --------------------
    default_team:      'red'       # 红队/蓝队
    default_method:    1           # 1=uni（单向），0=omni（全向）
    start_y:           [0, 1, 2]   # 起始列索引

    # -------------------- Topics --------------------
    mf_r2_data:                '/mf_r2_data'
    planning_paths_for_web:    '/planning/paths_for_web'

    # -------------------- 发布 / 日志数量限制 --------------------
    web_pub_top_n:  10          # 每个 kfs2 bucket 发布到 Web 的最多路径数
    log_top_n:      3           # 每个 kfs2 bucket 日志打印的最多路径数

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2 场地监控</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background-color: rgb(254, 186, 163);
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s;
        }
        body.team-red {
            background-color: rgb(254, 186, 163);
        }
        body.team-blue {
            background-color: rgb(129, 210, 214);
        }

        /* ====== 页面容器 ====== */
        .page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 6px 8px;
            gap: 6px;
        }

        /* ====== 顶栏 ====== */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 14px;
            background: white;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.08);
            flex-shrink: 0;
            font-size: 13px;
            color: #333;
        }
        .top-bar .title {
            font-size: 17px;
            font-weight: bold;
            color: #e65100;
            margin-right: 4px;
        }
        body.team-blue .top-bar .title { color: #0277bd; }

        .team-badge {
            padding: 3px 14px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 12px;
        }
        .team-badge.red { background: #ffcdd2; color: #b71c1c; }
        .team-badge.blue { background: #bbdefb; color: #0d47a1; }

        .top-bar .spacer { flex: 1; }
        .top-bar .info-text { font-size: 11px; color: #999; }

        /* ====== 主行：画布 + 状态面板 ====== */
        .main-row {
            flex: 1;
            display: flex;
            gap: 6px;
            min-height: 0;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: white;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.08);
            min-width: 0;
        }
        canvas#field-canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ====== 右侧状态面板（透明容器） ====== */
        .status-panel {
            width: 220px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            color: #333;
        }
        .panel-section {
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            background: white;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.08);
            padding: 10px;
        }
        .panel-topic { flex: 2; }
        .panel-action { flex: 1; }
        .panel-section-title {
            font-weight: bold;
            font-size: 14px;
            color: #333;
            padding-bottom: 4px;
            border-bottom: 2px solid #ddd;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .panel-section-body {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 2px;
        }
        .big-dot {
            display: inline-block;
            width: 12px; height: 12px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .status-panel .section-title {
            font-weight: bold;
            font-size: 13px;
            color: #555;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-label { color: #888; }
        .status-value { font-weight: bold; font-family: 'Consolas', monospace; }
        .status-indicator {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .indicator-ok    { background: #4CAF50; }
        .indicator-warn  { background: #FF9800; }
        .indicator-error { background: #F44336; }
        .indicator-idle  { background: #bbb; }

        /* ====== Action 面板 ====== */
        .action-control-row {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        .start-btn-wrapper {
            width: 50px; height: 50px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
            border: 2px solid transparent;
            padding: 1px;
            transition: border-color 0.2s;
        }
        .start-btn-wrapper.locked { border-color: #4CAF50; }
        .start-btn-wrapper.unlocked { border-color: transparent; }

        .start-btn {
            width: 44px; height: 44px;
            border: none; border-radius: 7px;
            background-color: #4CAF50;
            color: white;
            font-size: 20px; font-weight: bold;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
        }
        .start-btn:active { transform: scale(0.96); }

        .progress-fill {
            position: absolute;
            top: 4px; height: 41px;
            left: 0; right: 0;
            background: rgba(76, 175, 80, 0.3);
            z-index: 5;
            pointer-events: none;
            transform: scaleX(0);
            transform-origin: left center;
            border-radius: 7px;
        }
        .progress-fill.retracting {
            transition: transform 0.3s ease;
        }

        .region-cycler {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            justify-content: center;
        }
        .region-arrow {
            width: 24px; height: 24px;
            border: none;
            border-radius: 5px;
            background: #e8e8e8;
            color: #555;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .region-arrow:hover { background: #d5d5d5; }
        .region-arrow:active { background: #ccc; }
        .region-text {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            min-width: 50px;
            text-align: center;
            user-select: none;
        }

        .title-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }
        .data-dot {
            display: inline-block;
            width: 5px; height: 5px;
            border-radius: 50%;
            margin-right: 2px;
            vertical-align: middle;
            flex-shrink: 0;
        }
        .data-cell {
            display: inline-flex;
            align-items: center;
            gap: 1px;
            font-size: 10px;
        }
        .data-cell .data-label {
            color: #999;
            font-size: 9px;
            margin-right: 1px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dot-ok    { background: #4CAF50; }
        .dot-warn  { background: #FF9800; }
        .dot-error { background: #F44336; }
        .dot-idle  { background: #bbb; }

        /* ====== 响应式：窄屏面板移到底部 ====== */
        @media (max-width: 749px) {
            .main-row {
                flex-direction: column;
            }
            .status-panel {
                width: 100%;
                flex-shrink: 1;
                flex-direction: column;
                gap: 4px;
                padding: 0;
                font-size: 11px;
                max-height: 200px;
            }
            .panel-section {
                padding: 6px 8px;
            }
            .panel-topic { flex: 2; }
            .panel-action { flex: 1; }
            .panel-section-title {
                font-size: 12px;
            }
            .status-panel .section-title {
                width: auto;
                font-size: 11px;
            }
        }

        /* ====== 队伍选择弹窗 ====== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        .modal-dialog {
            background: white;
            border-radius: 16px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.25);
        }
        .modal-dialog h3 {
            margin-bottom: 24px;
            font-size: 20px;
            color: #333;
        }
        .modal-dialog .team-choice {
            display: flex;
            gap: 24px;
            justify-content: center;
        }
        .modal-dialog .team-btn {
            width: 130px;
            height: 130px;
            border-radius: 16px;
            border: 3px solid transparent;
            cursor: pointer;
            font-size: 22px;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .team-btn.btn-red {
            background: #ffebee;
            color: #c62828;
            border-color: #ef9a9a;
        }
        .team-btn.btn-blue {
            background: #e3f2fd;
            color: #0d47a1;
            border-color: #90caf9;
        }
        .team-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        /* ====== 响应式：窄屏 ====== */
        @media (max-width: 500px) {
            .top-bar { font-size: 11px; gap: 6px; padding: 4px 8px; }
            .top-bar .title { font-size: 14px; }
            .legend-overlay { font-size: 9px; gap: 6px; padding: 4px 8px; }
        }
    </style>
</head>
<body class="team-red">

    <div class="page">
        <!-- ========== 顶栏 ========== -->
        <div class="top-bar">
            <span class="title">R2 场地监控</span>
            <span class="team-badge" id="team-badge">--</span>
            <span class="spacer"></span>
            <span class="info-text" id="scale-info"></span>
        </div>

        <!-- ========== 主行：画布 + 状态面板 ========== -->
        <div class="main-row">
            <div class="canvas-container" id="canvas-container">
                <canvas id="field-canvas"></canvas>
            </div>
            <div class="status-panel" id="status-panel">
                <div class="panel-section panel-topic" id="panel-topic">
                    <div class="panel-section-title"><span class="big-dot dot-idle" id="dot-topic"></span>Topic</div>
                    <div class="panel-section-body">
                        <div class="section-title"><span class="title-dot dot-idle" id="dot-reloc"></span>/odin1/relocation</div>
                        <div class="data-row" id="row-reloc">
                            <span class="data-cell"><span class="data-dot dot-error" id="ddot-x"></span><span class="data-label">X</span><span class="status-value" id="val-x">--</span></span>
                            <span class="data-cell"><span class="data-dot dot-error" id="ddot-y"></span><span class="data-label">Y</span><span class="status-value" id="val-y">--</span></span>
                            <span class="data-cell"><span class="data-dot dot-error" id="ddot-yaw"></span><span class="data-label">Yaw</span><span class="status-value" id="val-yaw">--</span></span>
                        </div>
                        <div class="section-title" style="margin-top:2px;"><span class="title-dot dot-idle" id="dot-sensor"></span>/sensor_distances</div>
                        <div id="sensor-data-container">
                            <div class="data-row" id="srow-0"></div>
                            <div class="data-row" id="srow-1"></div>
                        </div>
                        <div class="section-title" style="margin-top:2px;"><span class="title-dot dot-idle" id="dot-r0"></span>/r0x0121</div>
                        <div id="r0x0121-data-container">
                            <div class="data-row" id="r0row-0"></div>
                            <div class="data-row" id="r0row-1"></div>
                            <div class="data-row" id="r0row-2"></div>
                        </div>
                        <div class="section-title" style="margin-top:2px;"><span class="title-dot dot-idle" id="dot-aruco"></span>/aruco_comm/tx_id</div>
                        <div class="data-row" id="row-aruco">
                            <span class="data-cell"><span class="data-dot dot-error" id="ddot-aruco"></span><span class="status-value" id="val-aruco">--</span></span>
                        </div>
                    </div>
                </div>
                <div class="panel-section panel-action" id="panel-action">
                    <div class="panel-section-title">Action</div>
                    <div class="panel-section-body">
                        <div class="action-control-row" id="action-control-row">
                            <div class="start-btn-wrapper locked" id="start-btn-wrapper">
                                <button class="start-btn" id="start-btn">启</button>
                            </div>
                            <div class="progress-fill" id="progress-fill"></div>
                            <div class="region-cycler" id="region-cycler">
                                <button class="region-arrow" id="region-prev">&#9664;</button>
                                <span class="region-text" id="region-text">full</span>
                                <button class="region-arrow" id="region-next">&#9654;</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== 队伍选择弹窗 ========== -->
    <div class="modal-overlay" id="team-modal">
        <div class="modal-dialog">
            <h3>请选择队伍</h3>
            <div class="team-choice">
                <button class="team-btn btn-red" onclick="selectTeam('red')">
                    <span style="font-size:42px;">🔴</span> 红队
                </button>
                <button class="team-btn btn-blue" onclick="selectTeam('blue')">
                    <span style="font-size:42px;">🔵</span> 蓝队
                </button>
            </div>
        </div>
    </div>

    <script src="roslib.min.js"></script>
    <script>
    // ================================================================
    //  场地坐标数据 (单位: mm)
    //
    //  地图竖着画，右手系 (X+前, Y+左)：
    //    世界 X 轴 (长边 12m) → Canvas 纵向 (上=maxX=场前，下=minX=场后)
    //    世界 Y 轴 (短边 6m)  → Canvas 横向 (左=maxY，右=minY  ← Y+ 向左!)
    // ================================================================

    const FIELD_CONFIG = {
        red: {
            name: '红队',
            cssClass: 'red',
            boundary: { minX: -400, maxX: 11600, minY: -4600, maxY: 1400 },
            // 梅林区 (第1～4行, 第0～2列)
            meilin: { minX: 2800, maxX: 7600, minY: -3400, maxY: 200 },
            // 高台
            highPlatform: { x: 9050, minY: -3100, maxY: 1400 },
            // 斜边边界墙
            diagWall: { y: -3100, minX: 8900, maxX: 10400 },
            // 斜坡
            ramp: { minX: 8900, maxX: 10400, minY: -4600, maxY: -3100 },
            // 竞技区分割线
            divideLine: { x: 9050, minY: -3100, maxY: 1400 },
        },
        blue: {
            name: '蓝队',
            cssClass: 'blue',
            boundary: { minX: -400, maxX: 11600, minY: -1400, maxY: 4600 },
            meilin: { minX: 2800, maxX: 7600, minY: -200, maxY: 3400 },
            highPlatform: { x: 9050, minY: -1400, maxY: 3100 },
            diagWall: { y: 3100, minX: 8900, maxX: 10400 },
            ramp: { minX: 8900, maxX: 10400, minY: 3100, maxY: 4600 },
            divideLine: { x: 9050, minY: -1400, maxY: 3100 },
        }
    };

    // ================================================================
    //  全局状态
    // ================================================================
    let currentTeam = null;
    const MEILIN_ROWS = 4;      // 第1～4行
    const MEILIN_COLS = 3;      // 第0～2列
    const CELL_SIZE_MM = 1200;  // 每格 1.2m

    // ================================================================
    //  机器人定位状态
    // ================================================================
    let robotPose = null;       // { x, y, yaw, frame_id, stamp } 或 null
    let rosConnected = false;
    let poseReceived = false;

    // ================================================================
    //  ROS 连接
    // ================================================================
    const rosHost = window.location.hostname || 'localhost';
    const ros = new ROSLIB.Ros({ url: 'ws://' + rosHost + ':9090' });

    ros.on('connection', function() {
        rosConnected = true;
        updateStatusPanel();
    });
    ros.on('close', function() {
        rosConnected = false;
        poseReceived = false;
        robotPose = null;
        sensorDistances = [];
        r0x0121Data = [];
        arucoValue = NaN;
        updateStatusPanel();
        updateSensorPanel();
        updateR0x0121Panel();
        updateArucoPanel();
        if (currentTeam) drawField();
    });
    ros.on('error', function() {
        rosConnected = false;
        updateStatusPanel();
        updateSensorPanel();
        updateR0x0121Panel();
        updateArucoPanel();
    });

    // 订阅 /odin1/relocation (geometry_msgs/PoseStamped)
    const relocationSub = new ROSLIB.Topic({
        ros: ros,
        name: '/odin1/relocation',
        messageType: 'geometry_msgs/PoseStamped'
    });

    relocationSub.subscribe(function(msg) {
        if (!msg || !msg.pose) {
            robotPose = null;
            poseReceived = false;
            updateStatusPanel();
            return;
        }

        const px = msg.pose.position.x * 1000;  // m → mm
        const py = msg.pose.position.y * 1000;
        const pz = msg.pose.position.z * 1000;

        // 合法性检查
        if (!isFinite(px) || !isFinite(py) || !isFinite(pz)) {
            robotPose = null;
            poseReceived = false;
            updateStatusPanel();
            return;
        }

        // 超出场地范围视为异常
        if (currentTeam) {
            const b = FIELD_CONFIG[currentTeam].boundary;
            if (px < b.minX - 1000 || px > b.maxX + 1000 ||
                py < b.minY - 1000 || py > b.maxY + 1000) {
                robotPose = { x: px, y: py, yaw: null, frame_id: msg.header.frame_id, outlier: true };
                poseReceived = true;
                updateStatusPanel();
                if (currentTeam) drawField();
                return;
            }
        }

        // 四元数 → yaw
        let yaw = null;
        if (msg.pose.orientation) {
            const q = msg.pose.orientation;
            const siny = 2 * (q.w * q.z + q.x * q.y);
            const cosy = 1 - 2 * (q.y * q.y + q.z * q.z);
            yaw = Math.atan2(siny, cosy);
        }

        robotPose = {
            x: px, y: py, yaw: yaw,
            frame_id: msg.header.frame_id || '',
            outlier: false
        };
        poseReceived = true;
        updateStatusPanel();
        if (currentTeam) drawField();
    });

    // 订阅 /sensor_distances (std_msgs/Float32MultiArray)
    let sensorDistances = [];   // 8 个传感器的距离，NaN 表示无效

    const sensorSub = new ROSLIB.Topic({
        ros: ros,
        name: '/sensor_distances',
        messageType: 'std_msgs/Float32MultiArray'
    });

    sensorSub.subscribe(function(msg) {
        if (!msg || !msg.data || msg.data.length === 0) {
            sensorDistances = [];
            updateSensorPanel();
            return;
        }

        sensorDistances = msg.data.map(function(v) {
            return (typeof v === 'number' && isFinite(v)) ? v : NaN;
        });
        updateSensorPanel();
    });

    // 订阅 /r0x0121 (std_msgs/Float32MultiArray)
    let r0x0121Data = [];

    const r0x0121Sub = new ROSLIB.Topic({
        ros: ros,
        name: '/r0x0121',
        messageType: 'std_msgs/Float32MultiArray'
    });

    r0x0121Sub.subscribe(function(msg) {
        if (!msg || !msg.data || msg.data.length === 0) {
            r0x0121Data = [];
            updateR0x0121Panel();
            return;
        }

        r0x0121Data = msg.data.map(function(v) {
            return (typeof v === 'number' && isFinite(v)) ? v : NaN;
        });
        updateR0x0121Panel();
    });

    // 订阅 /aruco_comm/tx_id (std_msgs/Int32)
    let arucoValue = NaN;

    const arucoSub = new ROSLIB.Topic({
        ros: ros,
        name: '/aruco_comm/tx_id',
        messageType: 'std_msgs/Int32'
    });

    arucoSub.subscribe(function(msg) {
        if (!msg || typeof msg.data !== 'number') {
            arucoValue = NaN;
        } else {
            arucoValue = (isFinite(msg.data)) ? msg.data : NaN;
        }
        updateArucoPanel();
    });

    // ================================================================
    //  更新 /aruco_comm/tx_id 面板
    // ================================================================
    function updateArucoPanel() {
        var dotAruco = document.getElementById('dot-aruco');
        var ddotAruco = document.getElementById('ddot-aruco');
        var valAruco = document.getElementById('val-aruco');
        if (!dotAruco || !ddotAruco || !valAruco) return;

        var ok = !isNaN(arucoValue);
        if (ok) {
            dotAruco.className = 'title-dot dot-ok';
            ddotAruco.className = 'data-dot dot-ok';
            valAruco.textContent = arucoValue;
        } else {
            dotAruco.className = 'title-dot dot-error';
            ddotAruco.className = 'data-dot dot-error';
            valAruco.textContent = '--';
        }
        updateTopicDot();
    }

    // ================================================================
    //  更新传感器面板
    // ================================================================
    function updateSensorPanel() {
        const dotSensor = document.getElementById('dot-sensor');
        if (!dotSensor) return;

        let validCount = 0;
        for (let i = 0; i < 8; i++) {
            const d = (i < sensorDistances.length) ? sensorDistances[i] : NaN;
            if (!isNaN(d)) validCount++;
        }
        if (validCount === 8) dotSensor.className = 'title-dot dot-ok';
        else if (validCount > 0) dotSensor.className = 'title-dot dot-warn';
        else dotSensor.className = 'title-dot dot-error';

        function cellHtml(i) {
            const d = (i < sensorDistances.length) ? sensorDistances[i] : NaN;
            const ok = !isNaN(d);
            const cls = ok ? 'dot-ok' : 'dot-error';
            const val = ok ? d.toFixed(0) + 'mm' : '--';
            return '<span class="data-cell"><span class="data-dot ' + cls + '"></span><span class="data-label">' + i + '</span><span class="status-value">' + val + '</span></span>';
        }
        var srow0 = document.getElementById('srow-0');
        var srow1 = document.getElementById('srow-1');
        if (srow0) srow0.innerHTML = cellHtml(0) + cellHtml(1) + cellHtml(2) + cellHtml(3);
        if (srow1) srow1.innerHTML = cellHtml(4) + cellHtml(5) + cellHtml(6) + cellHtml(7);
        updateTopicDot();
    }

    // ================================================================
    //  更新 /r0x0121 面板
    // ================================================================
    function updateR0x0121Panel() {
        const dotR0 = document.getElementById('dot-r0');
        if (!dotR0) return;

        const TOTAL = 11;
        let validCount = 0;
        for (let i = 0; i < TOTAL; i++) {
            const d = (i < r0x0121Data.length) ? r0x0121Data[i] : NaN;
            if (!isNaN(d)) validCount++;
        }
        if (validCount === TOTAL && r0x0121Data.length >= TOTAL) dotR0.className = 'title-dot dot-ok';
        else if (validCount > 0) dotR0.className = 'title-dot dot-warn';
        else dotR0.className = 'title-dot dot-error';

        function cellHtml(i) {
            const d = (i < r0x0121Data.length) ? r0x0121Data[i] : NaN;
            const ok = !isNaN(d);
            const cls = ok ? 'dot-ok' : 'dot-error';
            const val = ok ? d.toFixed(2) : '--';
            return '<span class="data-cell"><span class="data-dot ' + cls + '"></span><span class="data-label">' + i + '</span><span class="status-value">' + val + '</span></span>';
        }
        function fillRow(id, start, end) {
            var el = document.getElementById(id);
            if (!el) return;
            var h = '';
            for (var i = start; i < end; i++) h += cellHtml(i);
            el.innerHTML = h;
        }
        fillRow('r0row-0', 0, 4);
        fillRow('r0row-1', 4, 8);
        fillRow('r0row-2', 8, 11);
        updateTopicDot();
    }

    // ================================================================
    //  更新 Topic 大圆点 (聚合三个子Topic状态)
    // ================================================================
    function updateTopicDot() {
        var dotReloc = document.getElementById('dot-reloc');
        var dotSensor = document.getElementById('dot-sensor');
        var dotR0 = document.getElementById('dot-r0');
        var dotAruco = document.getElementById('dot-aruco');
        var dotTopic = document.getElementById('dot-topic');
        if (!dotTopic) return;

        function level(el) {
            if (!el) return 'error';
            if (el.classList.contains('dot-ok')) return 'ok';
            if (el.classList.contains('dot-warn')) return 'warn';
            return 'error';
        }

        var levels = [level(dotReloc), level(dotSensor), level(dotR0), level(dotAruco)];
        if (levels.every(function(l) { return l === 'ok'; })) {
            dotTopic.className = 'big-dot dot-ok';
        } else if (levels.every(function(l) { return l === 'error'; })) {
            dotTopic.className = 'big-dot dot-error';
        } else {
            dotTopic.className = 'big-dot dot-warn';
        }
    }

    // ================================================================
    //  Action 面板：锁定按钮 + 下拉框 + 长按发送
    // ================================================================
    let startLocked = true;
    let unlockTimer = null;
    let holdInterval = null;
    let isHolding = false;
    let selectedRegion = 'full';

    function lockStart() {
        clearTimeout(unlockTimer);
        clearInterval(holdInterval);
        startLocked = true;
        isHolding = false;
        var wrapper = document.getElementById('start-btn-wrapper');
        wrapper.classList.add('locked');
        wrapper.classList.remove('unlocked');
        var fill = document.getElementById('progress-fill');
        fill.classList.add('retracting');
        fill.style.transform = 'scaleX(0)';
        setTimeout(function() { fill.classList.remove('retracting'); }, 300);
    }

    function unlockStart() {
        startLocked = false;
        document.getElementById('start-btn-wrapper').classList.remove('locked');
        document.getElementById('start-btn-wrapper').classList.add('unlocked');
        unlockTimer = setTimeout(lockStart, 1000);
    }

    function beginHold() {
        clearTimeout(unlockTimer);
        isHolding = true;
        var fill = document.getElementById('progress-fill');
        var btn = document.getElementById('start-btn');
        var row = document.getElementById('action-control-row');
        var btnRect = btn.getBoundingClientRect();
        var rowLeft = row.getBoundingClientRect().left;
        fill.style.left = (btnRect.right - rowLeft - 10) + 'px';
        fill.classList.remove('retracting');
        fill.style.transform = 'scaleX(0)';

        var elapsed = 0;
        holdInterval = setInterval(function() {
            elapsed += 50;
            var pct = Math.min(elapsed / 1000, 1);
            fill.style.transform = 'scaleX(' + pct + ')';
            if (elapsed >= 1000) {
                clearInterval(holdInterval);
                fireStart();
                lockStart();
            }
        }, 50);
    }

    // ---- 按钮事件 ----
    (function() {
        var startBtn = document.getElementById('start-btn');
        if (!startBtn) return;

        startBtn.addEventListener('mousedown', function(e) {
            e.preventDefault();
            if (startLocked) { unlockStart(); }
            else { beginHold(); }
        });

        document.addEventListener('mouseup', function(e) {
            if (isHolding) {
                clearInterval(holdInterval);
                lockStart();
            }
        });

        startBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (startLocked) { unlockStart(); }
            else { beginHold(); }
        }, { passive: false });

        document.addEventListener('touchend', function(e) {
            if (isHolding) {
                clearInterval(holdInterval);
                lockStart();
            }
        });
    })();

    // ---- 区域循环选择 ----
    (function() {
        var REGIONS = ['full', 'prepare', 'meilin', 'final', 'meilin_final'];
        var regionIndex = 0;
        var textEl = document.getElementById('region-text');
        var prevBtn = document.getElementById('region-prev');
        var nextBtn = document.getElementById('region-next');

        function update() {

        prevBtn.addEventListener('click', function() {
            regionIndex = (regionIndex - 1 + REGIONS.length) % REGIONS.length;

    // ================================================================
    //  在 canvas 上绘制机器人
    // ================================================================
    function drawRobot(ctx, cfg, scale, leftM, topM) {
        if (!robotPose || robotPose.outlier) return;

        const rp = W(robotPose.x, robotPose.y, cfg, scale, leftM, topM);
        const r = Math.max(6, 200 * scale);  // 机器人半径 ~200mm → 像素，随画布缩放

        // 朝向箭头（竖版 canvas）
        if (robotPose.yaw !== null) {
            // canvas 中：世界 X+ = 上(canvas Y-), 世界 Y+ = 左(canvas X-)
            // canvas_dx = -sin(yaw), canvas_dy = -cos(yaw)
            const canvasAngle = Math.atan2(-Math.cos(robotPose.yaw), -Math.sin(robotPose.yaw));
            const arrowLen = r * 2.2;

            // 三角形机身
            const a0 = canvasAngle;
            const aL = canvasAngle + Math.PI * 0.8;
            const aR = canvasAngle - Math.PI * 0.8;
            const tipX = rp.x + Math.cos(a0) * arrowLen;
            const tipY = rp.y + Math.sin(a0) * arrowLen;

            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            ctx.moveTo(tipX, tipY);
            ctx.lineTo(
                rp.x + Math.cos(aL) * r * 1.2,
                rp.y + Math.sin(aL) * r * 1.2);
            ctx.lineTo(
                rp.x + Math.cos(aR) * r * 1.2,
                rp.y + Math.sin(aR) * r * 1.2);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        } else {
            // 无朝向信息：画圆点
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(rp.x, rp.y, r, 0, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();
        }
    }

    function isFinite(v) {
        return typeof v === 'number' && !isNaN(v) && v !== Infinity && v !== -Infinity;
    }

    // ================================================================
    //  初始化
    // ================================================================
    function init() {
        const params = new URLSearchParams(window.location.search);
        const teamParam = params.get('team');
        if (teamParam === 'red' || teamParam === 'blue') {
            selectTeam(teamParam);
        } else {
            document.getElementById('team-modal').classList.add('active');
        }

    function selectTeam(team) {
        currentTeam = team;
        document.getElementById('team-modal').classList.remove('active');

        // 更新 body 背景色
        document.body.className = 'team-' + team;

        // 更新顶栏
        const badge = document.getElementById('team-badge');

    // ================================================================
    //  坐标转换（竖版 rotated，右手系：X+ 向前，Y+ 向左）
    //  world X (长轴 12m) → canvas Y（上=maxX=场前，下=minX=场后）
    //  world Y (短轴 6m)  → canvas X（左=maxY，右=minY   ← Y+ 向左！）
    //  贴左上：topMargin 对应 world maxX，leftMargin 对应 world maxY
    // ================================================================
    function W(wx, wy, cfg, scale, leftM, topM) {
        const cx = leftM + (cfg.boundary.maxY - wy) * scale;  // Y+ = 左
        const cy = topM  + (cfg.boundary.maxX - wx) * scale;  // X+ = 上
        return { x: cx, y: cy };
    }

    // 将 world 矩形转为 canvas 矩形
    // world (minX,minY) = 场后右侧, (maxX,maxY) = 场前左侧
    // canvas top-left  = W(maxX, maxY)  ← 场前左侧
    // canvas bot-right = W(minX, minY)  ← 场后右侧
    function worldRect(minX, minY, maxX, maxY, cfg, scale, leftM, topM) {
        const tl = W(maxX, maxY, cfg, scale, leftM, topM);
        const br = W(minX, minY, cfg, scale, leftM, topM);
        const x = Math.min(tl.x, br.x);
        const y = Math.min(tl.y, br.y);
        const w = Math.abs(br.x - tl.x);
        const h = Math.abs(br.y - tl.y);
        return { x, y, w, h };
    }

    // ================================================================
    //  绘制场地
    // ================================================================
    function drawField() {
        const canvas = document.getElementById('field-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        const cfg = FIELD_CONFIG[currentTeam];

        // --- 可用空间 ---
        const availW = container.clientWidth;
        const availH = container.clientHeight;

        // 竖版：canvas 宽 = 6000 * scale, 高 = 12000 * scale
        const mapShort_mm = cfg.boundary.maxY - cfg.boundary.minY;  // 6000
        const mapLong_mm  = cfg.boundary.maxX - cfg.boundary.minX;  // 12000

        // 四周留白：贴左上，左右下留标注空间
        const topM  = 10;
        const leftM = 8;
        const rightM = 55;  // 右侧留刻度标注
        const botM   = 50;  // 底部留刻度标注

        const scaleW = (availW - leftM - rightM) / mapShort_mm;
        const scaleH = (availH - topM - botM)   / mapLong_mm;
        const scale = Math.min(scaleW, scaleH);

        const canvasW = leftM + mapShort_mm * scale + rightM;
        const canvasH = topM  + mapLong_mm  * scale + botM;

        // 高清
        const dpr = window.devicePixelRatio || 1;
        canvas.width  = Math.round(canvasW * dpr);
        canvas.height = Math.round(canvasH * dpr);
        canvas.style.width  = Math.round(canvasW) + 'px';
        canvas.style.height = Math.round(canvasH) + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // 比例信息
        document.getElementById('scale-info').textContent =
            '1px ≈ ' + (1/scale).toFixed(0) + 'mm | ' +
            (mapLong_mm/1000).toFixed(1) + 'm × ' + (mapShort_mm/1000).toFixed(1) + 'm';

        // --- 便捷：将 world mm 矩形直接画 ---
        function fillRect(minX, minY, maxX, maxY, color) {
            const r = worldRect(minX, minY, maxX, maxY, cfg, scale, leftM, topM);
            ctx.fillStyle = color;
            ctx.fillRect(r.x, r.y, r.w, r.h);
        }
        function strokeRect(minX, minY, maxX, maxY, color, lw, dash) {
            const r = worldRect(minX, minY, maxX, maxY, cfg, scale, leftM, topM);
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            if (dash) ctx.setLineDash(dash);
            else ctx.setLineDash([]);
            ctx.strokeRect(r.x, r.y, r.w, r.h);
            ctx.restore();
        }
        function drawLine(x1, y1, x2, y2, color, lw, dash) {
            const a = W(x1, y1, cfg, scale, leftM, topM);
            const b = W(x2, y2, cfg, scale, leftM, topM);
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            if (dash) ctx.setLineDash(dash);
            else ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
            ctx.restore();
        }

        // ============================================================
        //  1. Canvas 底色
        // ============================================================
        ctx.fillStyle = '#f5f5f5';
        ctx.fillRect(0, 0, canvasW, canvasH);

        // ============================================================
        //  2. 地图边界
        // ============================================================
        fillRect(cfg.boundary.minX, cfg.boundary.minY,
                 cfg.boundary.maxX, cfg.boundary.maxY, '#fafafa');
        strokeRect(cfg.boundary.minX, cfg.boundary.minY,
                   cfg.boundary.maxX, cfg.boundary.maxY, '#546E7A', 2.2, null);

        // ============================================================
        //  3. 区域背景色：武馆区 / 梅林区 / 竞技区
        // ============================================================
        const X_DOJO = 1800;  // 武馆区 / 梅林区分割线 (1.8m)

        // 配色表 (RGB)
        const COLORS = {
            retryRed:       'rgb(223,34,34)',   // Start Zone → 重试区
            retryBlue:      'rgb(50,0,255)',
            dojoRed:        'rgb(250,220,218)',  // Zone 1 → 武馆区
            dojoBlue:       'rgb(128,199,226)',
            pathwayRed:     'rgb(236,162,151)',  // Zone 2 Pathway → 梅林区非网格
            pathwayBlue:    'rgb(128,191,209)',
            zone3Red:       'rgb(254,186,163)',  // Zone 3 → 竞技区
            zone3Blue:      'rgb(129,210,214)',
            guildLine:      'rgb(255,255,255)',
            fence:          'rgb(100,62,0)',
            ramp:           'rgb(192,189,182)',
            forest200:      'rgb(41,82,16)',
            forest400:      'rgb(42,113,56)',
            forest600:      'rgb(152,166,80)',
            staffRack:      'rgb(155,95,0)',
        };

        const isRed = currentTeam === 'red';

        // 武馆区 (Zone 1)
        fillRect(cfg.boundary.minX, cfg.boundary.minY,
                 X_DOJO, cfg.boundary.maxY,
                 isRed ? COLORS.dojoRed : COLORS.dojoBlue);
        // 梅林区非网格部分 (Zone 2 Pathway)
        fillRect(X_DOJO, cfg.boundary.minY,
                 cfg.divideLine.x, cfg.boundary.maxY,
                 isRed ? COLORS.pathwayRed : COLORS.pathwayBlue);
        // 竞技区 (Zone 3)
        fillRect(cfg.divideLine.x, cfg.boundary.minY,
                 cfg.boundary.maxX, cfg.boundary.maxY,
                 isRed ? COLORS.zone3Red : COLORS.zone3Blue);

        // ============================================================
        //  4. 分割线 (Guild line = white)
        // ============================================================
        drawLine(X_DOJO, cfg.boundary.minY,
                 X_DOJO, cfg.boundary.maxY,
                 COLORS.guildLine, 2, [8, 4]);
        drawLine(cfg.divideLine.x, cfg.divideLine.minY,
                 cfg.divideLine.x, cfg.divideLine.maxY,
                 COLORS.guildLine, 2, [8, 4]);

        // ============================================================
        //  5. 梅林区 4×3 网格 (按高度着色)
        // ============================================================
        // 高度表 (mm): [row][col], row=1..4, col=0..2
        const HEIGHT_MAP = {
            red: [
                [400, 200, 400],  // row 1
                [200, 400, 600],  // row 2
                [400, 600, 400],  // row 3
                [200, 400, 200],  // row 4
            ],
            blue: [
                [400, 200, 400],  // row 1
                [600, 400, 200],  // row 2
                [400, 600, 400],  // row 3
                [200, 400, 200],  // row 4
            ],
        };

        function forestColor(h) {
            if (h <= 200) return COLORS.forest200;
            if (h <= 400) return COLORS.forest400;
            return COLORS.forest600;
        }

        const mel = cfg.meilin;

        // 逐格填充颜色
        for (let r = 0; r < MEILIN_ROWS; r++) {
            for (let c = 0; c < MEILIN_COLS; c++) {
                const cx0 = mel.minX + r * CELL_SIZE_MM;
                const cx1 = cx0 + CELL_SIZE_MM;
                const cy0 = mel.minY + c * CELL_SIZE_MM;
                const cy1 = cy0 + CELL_SIZE_MM;
                const h = HEIGHT_MAP[currentTeam][r][c];
                fillRect(cx0, cy0, cx1, cy1, forestColor(h));
            }
        }

        // 网格线
        for (let r = 0; r <= MEILIN_ROWS; r++) {
            const rx = mel.minX + r * CELL_SIZE_MM;
            drawLine(rx, mel.minY, rx, mel.maxY, 'rgba(255,255,255,0.35)', 0.8, null);
        }
        for (let c = 0; c <= MEILIN_COLS; c++) {
            const cy = mel.minY + c * CELL_SIZE_MM;
            drawLine(mel.minX, cy, mel.maxX, cy, 'rgba(255,255,255,0.35)', 0.8, null);
        }

        // 单元格坐标 (行,列)
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (let r = 0; r < MEILIN_ROWS; r++) {
            for (let c = 0; c < MEILIN_COLS; c++) {
                const gx = mel.minX + (r + 0.5) * CELL_SIZE_MM;
                const gy = mel.minY + (c + 0.5) * CELL_SIZE_MM;
                const gp = W(gx, gy, cfg, scale, leftM, topM);
                ctx.fillText('('+(r+1)+','+c+')', gp.x, gp.y);
            }
        }

        // ============================================================
        //  6. 斜边边界墙 (Fence)
        // ============================================================
        const dw = cfg.diagWall;
        drawLine(dw.minX, dw.y, dw.maxX, dw.y, COLORS.fence, 3, null);

        // ============================================================
        //  7. 斜坡 (Ramp)
        // ============================================================
        const rp = cfg.ramp;
        const rpTL = W(rp.minX, rp.maxY, cfg, scale, leftM, topM);
        const rpTR = W(rp.maxX, rp.maxY, cfg, scale, leftM, topM);
        const rpBR = W(rp.maxX, rp.minY, cfg, scale, leftM, topM);
        const rpBL = W(rp.minX, rp.minY, cfg, scale, leftM, topM);

        ctx.fillStyle = COLORS.ramp;
        ctx.beginPath();
        ctx.moveTo(rpTL.x, rpTL.y);
        ctx.lineTo(rpTR.x, rpTR.y);
        ctx.lineTo(rpBR.x, rpBR.y);
        ctx.lineTo(rpBL.x, rpBL.y);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // ============================================================
        //  8. 重试区 (0.8m × 0.8m)
        // ============================================================
        const RETRY_HALF = 400;
        const retryColor = isRed ? COLORS.retryRed : COLORS.retryBlue;

        function drawRetryZone(cx_mm, cy_mm) {
            const x0 = cx_mm - RETRY_HALF;
            const x1 = cx_mm + RETRY_HALF;
            const y0 = cy_mm - RETRY_HALF;
            const y1 = cy_mm + RETRY_HALF;
            fillRect(x0, y0, x1, y1, retryColor);
        }

        // 原点 (0,0)
        drawRetryZone(0, 0);

        // 角落：蓝队左上角，红队右上角
        if (currentTeam === 'blue') {
            drawRetryZone(
                cfg.boundary.maxX - RETRY_HALF,
                cfg.boundary.maxY - RETRY_HALF
            );
        } else {
            drawRetryZone(
                cfg.boundary.maxX - RETRY_HALF,
                cfg.boundary.minY + RETRY_HALF
            );
        }

        // ============================================================
        //  9. 标尺刻度 (四条边，从整米数开始)
        // ============================================================
        const tickColor = '#999';

        // X 轴起始整米 (对齐 0)
        const xTickStart = 0;
        const xTickEnd = 11000;

        // X 刻度 — 右边缘
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        for (let wx = xTickStart; wx <= xTickEnd; wx += 1000) {
            const p = W(wx, cfg.boundary.minY, cfg, scale, leftM, topM);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + 5, p.y);
            ctx.strokeStyle = tickColor; ctx.lineWidth = 0.8; ctx.stroke();
            ctx.fillStyle = tickColor;
            ctx.fillText((wx/1000).toFixed(0)+'m', p.x + 7, p.y);
        }

        // X 刻度 — 左边缘
        ctx.textAlign = 'right';
        for (let wx = xTickStart; wx <= xTickEnd; wx += 1000) {
            const p = W(wx, cfg.boundary.maxY, cfg, scale, leftM, topM);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - 5, p.y);
            ctx.strokeStyle = tickColor; ctx.lineWidth = 0.8; ctx.stroke();
            ctx.fillStyle = tickColor;
            ctx.fillText((wx/1000).toFixed(0)+'m', p.x - 7, p.y);
        }

        // Y 轴起始整米
        const yTickStart = Math.ceil(cfg.boundary.minY / 1000) * 1000;
        const yTickEnd = Math.floor(cfg.boundary.maxY / 1000) * 1000;

        // Y 刻度 — 底部
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        for (let wy = yTickStart; wy <= yTickEnd; wy += 1000) {
            const p = W(cfg.boundary.minX, wy, cfg, scale, leftM, topM);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y + 5);
            ctx.strokeStyle = tickColor; ctx.lineWidth = 0.8; ctx.stroke();
            ctx.fillStyle = tickColor;
            ctx.fillText((wy/1000).toFixed(1)+'m', p.x, p.y + 6);
        }

        // Y 刻度 — 顶部
        ctx.textBaseline = 'bottom';
        for (let wy = yTickStart; wy <= yTickEnd; wy += 1000) {
            const p = W(cfg.boundary.maxX, wy, cfg, scale, leftM, topM);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y - 5);
            ctx.strokeStyle = tickColor; ctx.lineWidth = 0.8; ctx.stroke();
            ctx.fillStyle = tickColor;
            ctx.fillText((wy/1000).toFixed(1)+'m', p.x, p.y - 6);
        }

        // ============================================================
        //  10. 机器人位置
        // ============================================================
        drawRobot(ctx, cfg, scale, leftM, topM);
    }

    // ================================================================
    //  窗口大小变化时重绘
    // ================================================================
    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            if (currentTeam) drawField();
        }, 200);
    });

    // 容器大小也可能由 CSS 变化，用 ResizeObserver
    if (window.ResizeObserver) {
        new ResizeObserver(() => {
            if (currentTeam) drawField();
        }).observe(document.getElementById('canvas-container'));
    }

    // ================================================================
    //  启动
    // ================================================================
    init();
    </script>
</body>
</html>
